apiVersion: apps/v1
kind: Deployment
metadata:
  name: showtimes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: showtimes
  template:
    metadata:
      labels:
        app: showtimes
    spec:
      containers:
      - name: showtimes
        image: yourdockerhub/showtimes-service
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          value: mongodb://mongo:27017/showtimes_db
---
apiVersion: v1
kind: Service
metadata:
  name: showtimes
spec:
  type: NodePort
  selector:
    app: showtimes
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30008
